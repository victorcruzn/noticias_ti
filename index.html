<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Notícias - TI & Mercado</title>

<style>
body { font-family: Arial; background: #eef1f5; margin: 0; }

.header {
  background: #1f2937;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

.section { margin-bottom: 40px; }
.section h3 { margin-bottom: 15px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.title { font-weight: bold; }
.date { font-size: 12px; color: #666; }
.desc { font-size: 13px; margin: 10px 0; }

.alert {
  display: none;
  background: #c62828;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 20px;
}

a { color: #0078d4; text-decoration: none; font-weight: bold; }

.footer {
  text-align: center;
  color: #666;
  font-size: 12px;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
<h2>📰 Portal de Notícias - Tecnologia & Mercado</h2>
</div>

<div class="container">

<div id="alert" class="alert"></div>

<div class="section">
<h3>🔐 Segurança da Informação</h3>
<div id="secNews" class="grid"></div>
</div>

<div class="section">
<h3>🤖 Inteligência Artificial</h3>
<div id="aiNews" class="grid"></div>
</div>

<div class="section">
<h3>🏢 Tecnologia Corporativa</h3>
<div id="corpNews" class="grid"></div>
</div>

<div class="section">
<h3>📊 Mercado & Negócios</h3>
<div id="marketNews" class="grid"></div>
</div>

<div class="section">
<h3>🛠️ Indústria & Segmento (Pyramid)</h3>
<div id="industryNews" class="grid"></div>
</div>

<div class="footer">
Atualizado automaticamente a cada 5 minutos
</div>

</div>

<script>

// PALAVRAS IMPORTANTES
const keywords = ["ia", "inteligência", "segurança", "ataque", "vazamento", "empresa", "mercado", "tecnologia", "indústria"];
const criticalWords = ["ataque", "vazamento", "falha", "crise", "prejuízo", "demissão"];

function isRelevant(title) {
  return keywords.some(k => title.toLowerCase().includes(k));
}

function isCritical(title) {
  return criticalWords.some(k => title.toLowerCase().includes(k));
}

async function loadNews(containerId, rssUrl) {
  try {
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
    const data = await res.json();

    const container = document.getElementById(containerId);
    container.innerHTML = "";

    let count = 0;

    data.items.forEach(item => {

      if (!isRelevant(item.title)) return;
      if (count >= 4) return;

      const desc = item.description.replace(/<[^>]*>/g, '').substring(0, 120);

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${item.title}</div>
        <div class="date">${item.pubDate.split(" ")[0]}</div>
        <div class="desc">${desc}...</div>
        <a href="${item.link}" target="_blank">Ler matéria completa</a>
      `;

      container.appendChild(card);

      // ALERTA CRÍTICO
      if (isCritical(item.title)) {
        const alert = document.getElementById("alert");
        alert.style.display = "block";
        alert.innerText = "🚨 ALERTA: " + item.title;
      }

      count++;
    });

  } catch {
    document.getElementById(containerId).innerHTML = "Conteúdo indisponível";
  }
}

// ATUALIZAÇÃO
function refreshNews() {

  loadNews("secNews", "https://news.google.com/rss/search?q=segurança+da+informação+Brasil");

  loadNews("aiNews", "https://canaltech.com.br/rss/inteligencia-artificial/");

  loadNews("corpNews", "https://www.convergenciadigital.com.br/rss");

  loadNews("marketNews", "https://www.infomoney.com.br/feed/");

  loadNews("industryNews", "https://news.google.com/rss/search?q=industria+manufatura+Brasil");

}

refreshNews();
setInterval(refreshNews, 300000);

</script>

</body>
</html>
