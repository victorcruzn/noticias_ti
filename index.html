<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Notícias - Tecnologia & Mercado</title>

<style>
body {
  font-family: Arial;
  background: #eef1f5;
  margin: 0;
}

.header {
  background: #1f2937;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  padding: 20px;
}

.section {
  margin-bottom: 40px;
}

.section h3 {
  margin-bottom: 15px;
  color: #111827;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.title {
  font-weight: bold;
  margin-bottom: 8px;
}

.date {
  font-size: 12px;
  color: #666;
}

.desc {
  font-size: 13px;
  margin: 10px 0;
}

a {
  color: #0078d4;
  text-decoration: none;
  font-weight: bold;
}

.footer {
  text-align: center;
  color: #666;
  font-size: 12px;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
  <h2>📰 Portal de Notícias - Tecnologia & Mercado</h2>
</div>

<div class="container">

<!-- SEGURANÇA -->
<div class="section">
<h3>🔐 Segurança da Informação</h3>
<div id="secNews" class="grid"></div>
</div>

<!-- IA -->
<div class="section">
<h3>🤖 Inteligência Artificial</h3>
<div id="aiNews" class="grid"></div>
</div>

<!-- CORPORATIVO -->
<div class="section">
<h3>🏢 Tecnologia Corporativa</h3>
<div id="corpNews" class="grid"></div>
</div>

<!-- MERCADO -->
<div class="section">
<h3>📊 Mercado & Negócios</h3>
<div id="marketNews" class="grid"></div>
</div>

<!-- INDUSTRIA PYRAMID -->
<div class="section">
<h3>🛠️ Indústria & Segmento (Pyramid)</h3>
<div id="industryNews" class="grid"></div>
</div>

<div class="footer">
Atualizado automaticamente a cada 5 minutos
</div>

</div>

<script>

// FUNÇÃO GENÉRICA
async function loadNews(containerId, rssUrl) {
  try {
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
    const data = await res.json();

    const container = document.getElementById(containerId);
    container.innerHTML = "";

    data.items.slice(0, 4).forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const desc = item.description.replace(/<[^>]*>/g, '').substring(0, 120);

      card.innerHTML = `
        <div class="title">${item.title}</div>
        <div class="date">${item.pubDate.split(" ")[0]}</div>
        <div class="desc">${desc}...</div>
        <a href="${item.link}" target="_blank">Ler matéria completa</a>
      `;

      container.appendChild(card);
    });

  } catch {
    document.getElementById(containerId).innerHTML = "Erro ao carregar notícias";
  }
}

// ATUALIZAÇÃO
function refreshNews() {

  // Segurança
  loadNews("secNews", "https://www.convergenciadigital.com.br/rss/categoria/seguranca");

  // IA
  loadNews("aiNews", "https://canaltech.com.br/rss/inteligencia-artificial/");

  // Corporativo
  loadNews("corpNews", "https://www.convergenciadigital.com.br/rss");

  // Mercado (corrigido)
  loadNews("marketNews", "https://www.infomoney.com.br/feed/");

  // Indústria (Pyramid)
  loadNews("industryNews", "https://www.industryweek.com/rss");

}

// INICIAR
refreshNews();
setInterval(refreshNews, 300000);

</script>

</body>
</html>
